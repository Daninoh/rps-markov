<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markov Chain RPS - Two Players</title>
    <style>
        body {
            font-family: sans-serif;
            background-color: #f0f2f5;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .player-container {
            display: flex;
            gap: 20px;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            overflow-x: auto;
        }

        /* Controls Area */
        .controls {
            width: 120px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
        }

        button {
            font-size: 20px;
            padding: 10px;
            cursor: pointer;
            border: 1px solid #ddd;
            border-radius: 8px;
            background: #fff;
        }

        button:hover {
            background: #f0f0f0;
        }

        .undo-btn {
            font-size: 12px;
            background: #ffeded;
            color: #cc0000;
        }

        /* Dataset Area */
        .dataset-section {
            flex: 1;
            min-width: 300px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 5px;
            margin-top: 10px;
        }

        .box {
            height: 35px;
            border: 2px solid #eee;
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            background: #fafafa;
        }

        /* Markov Area */
        .markov-section {
            position: relative;
            width: 400px;
            height: 350px;
            flex-shrink: 0;
        }

        .markov-bg {
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        /* Icons & Inputs Positioning */
        .node {
            position: absolute;
            font-size: 35px;
            z-index: 2;
            width: 50px;
            text-align: center;
        }

        .paper-node {
            top: 18%;
            left: 44%;
        }

        .rock-node {
            top: 62%;
            left: 19%;
        }

        .scis-node {
            top: 62%;
            left: 68%;
        }

        .frac {
            position: absolute;
            z-index: 3;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: white;
            padding: 2px;
        }

        .frac input {
            width: 25px;
            text-align: center;
            border: 1px solid #bbb;
            font-size: 12px;
        }

        .denom {
            border-top: 1px solid black;
            width: 100%;
            text-align: center;
            font-size: 12px;
            font-weight: bold;
            margin-top: 2px;
        }

        /* Coordinate Adjustments */
        .f-pp {
            top: -5%;
            left: 46%;
        }

        .f-rr {
            top: 65%;
            left: 2%;
        }

        .f-ss {
            top: 65%;
            left: 91%;
        }

        .f-pr {
            top: 38%;
            left: 23%;
        }

        .f-rp {
            top: 48%;
            left: 40%;
        }

        .f-ps {
            top: 38%;
            left: 70%;
        }

        .f-sp {
            top: 48%;
            left: 53%;
        }

        .f-rs {
            top: 68%;
            left: 46%;
        }

        .f-sr {
            top: 83%;
            left: 46%;
        }
    </style>
</head>

<body>

    <div id="p1-root" class="player-container"></div>

    <div id="p2-root" class="player-container"></div>

    <script>
        class PlayerMarkovApp {
            constructor(containerId, playerName) {
                this.container = document.getElementById(containerId);
                this.name = playerName;
                this.history = [];
                this.renderBase();
                this.update();
            }

            renderBase() {
                this.container.innerHTML = `
                    <div class="controls">
                        <strong style="display:block; margin-bottom:5px;">${this.name}</strong>
                        <div class="btn-group">
                            <button onclick="${this.name.replace(' ', '')}.add('✊')">✊</button>
                            <button onclick="${this.name.replace(' ', '')}.add('✋')">✋</button>
                            <button onclick="${this.name.replace(' ', '')}.add('✌️')">✌️</button>
                        </div>
                        <button class="undo-btn" onclick="${this.name.replace(' ', '')}.undo()">Undo</button>
                    </div>
                    <div class="dataset-section">
                        <strong>Dataset</strong>
                        <div class="grid" id="${this.name}-grid"></div>
                    </div>
                    <div class="markov-section">
                        <img src="empty-markov.svg" class="markov-bg">
                        <div class="node paper-node">✋</div>
                        <div class="node rock-node">✊</div>
                        <div class="node scis-node">✌️</div>
                        
                        <div class="frac f-pp"><input type="text"><div class="denom d-p">0</div></div>
                        <div class="frac f-pr"><input type="text"><div class="denom d-p">0</div></div>
                        <div class="frac f-ps"><input type="text"><div class="denom d-p">0</div></div>
                        <div class="frac f-rr"><input type="text"><div class="denom d-r">0</div></div>
                        <div class="frac f-rp"><input type="text"><div class="denom d-r">0</div></div>
                        <div class="frac f-rs"><input type="text"><div class="denom d-r">0</div></div>
                        <div class="frac f-ss"><input type="text"><div class="denom d-s">0</div></div>
                        <div class="frac f-sp"><input type="text"><div class="denom d-s">0</div></div>
                        <div class="frac f-sr"><input type="text"><div class="denom d-s">0</div></div>
                    </div>
                `;
            }

            add(move) {
                this.history.push(move);
                this.update();
            }

            undo() {
                this.history.pop();
                this.update();
            }

            update() {
                // Update Grid
                const grid = document.getElementById(`${this.name}-grid`);
                grid.innerHTML = '';
                for (let i = 0; i < 40; i++) {
                    const box = document.createElement('div');
                    box.className = 'box';
                    box.textContent = this.history[i] || '';
                    grid.appendChild(box);
                }

                // Calculate Denominators (total transitions AWAY from a state)
                let counts = { '✊': 0, '✋': 0, '✌️': 0 };
                for (let i = 0; i < this.history.length - 1; i++) {
                    counts[this.history[i]]++;
                }

                // Apply to UI
                this.container.querySelectorAll('.d-r').forEach(el => el.textContent = counts['✊']);
                this.container.querySelectorAll('.d-p').forEach(el => el.textContent = counts['✋']);
                this.container.querySelectorAll('.d-s').forEach(el => el.textContent = counts['✌️']);
            }
        }

        // Initialize the two players
        // We name the variables Player1 and Player2 so the buttons can find them
        const Player1 = new PlayerMarkovApp('p1-root', 'Player 1');
        const Player2 = new PlayerMarkovApp('p2-root', 'Player 2');
    </script>
</body>

</html>
